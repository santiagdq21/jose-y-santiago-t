name: Pruebas Biblioteca - CI

# Se define cuando se inicia este workflow
on: [push, pull_request]

jobs:
  test:
    # Se inicia una máquina virtual Ubuntu
    runs-on: ubuntu-latest
    # Se define el servicio de base de datos MySQL
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: biblioteca
        ports:
          - 3306:3306
        # Se realiza health check, para asegurar que las pruebas no fallen por falta de conexión inicial
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      # Se descarga el repositorio a la máquina virtual
      - name: Checkout del código
        uses: actions/checkout@v3
      # Se instala python
      - name: Instalación Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      # Se prepara la base de datos
      - name: Preparación Base de Datos
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS biblioteca;"
          mysql -h 127.0.0.1 -u root -proot biblioteca < biblioteca.sql
      # Se instalan dependencias para microservicios y pruebas
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests
      # Se levantan los 4 microservicios en segundo plano
      - name: Ejecución de los microservicios
        run: |
          cd services/usuarios && python app.py &
          cd services/paises && python app.py &
          cd services/autores && python app.py &
          cd services/editoriales && python app.py &
          sleep 3
      # Se ejecutan las pruebas de los 4 microservicios
      - name: Ejecución pruebas con Pytest
        env:
          # Se indica al código que la DB está en localhost para el entorno de GitHub
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: biblioteca
        # Se especifica carpeta para los tests
        run: |
          pytest services/usuarios/test_usuarios.py -v
          pytest services/paises/test_paises.py -v
          pytest services/autores/test_autores.py -v
          pytest services/editoriales/test_editoriales.py -v